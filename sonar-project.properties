# SonarQube configuration for BE-DashboardServices (Node.js)
sonar.projectKey=chaturbhujaplots-salestool-be-dashboardservices
sonar.projectName=Chaturbhujaplots SalesTool - Dashboard Services
sonar.projectVersion=1.0

sonar.sources=src
sonar.exclusions=**/node_modules/**,**/__tests__/**,**/*.test.*,**/*.spec.*,**/coverage/**

sonar.tests=src
sonar.test.inclusions=**/*.test.js,**/*.spec.js
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.language=js
sonar.sourceEncoding=UTF-8
sonar.qualitygate.wait=true
